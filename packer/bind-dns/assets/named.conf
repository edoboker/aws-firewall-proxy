acl "shared_dns_clients" {
    127.0.0.1;
    ::1;
    __BIND_ALLOW_QUERY_CIDR__;
};

options {
    directory "/var/named";

    listen-on port 53 { any; };
    listen-on-v6 port 53 { none; };

    recursion yes;
    allow-query { shared_dns_clients; };
    allow-recursion { shared_dns_clients; };
    allow-query-cache { shared_dns_clients; };

    forward only;
    forwarders {
        169.254.169.253;
    };

    // This cache forwards misses to the DNS VPC's AmazonProvidedDNS resolver
    // instead of recursing directly. Avoid turning valid forwarded answers into
    // SERVFAIL when named cannot complete its own DNSSEC validation path.
    dnssec-validation no;
    auth-nxdomain no;
    minimal-responses yes;

    min-cache-ttl __BIND_MIN_CACHE_TTL__;
    stale-cache-enable yes;
    stale-answer-enable yes;
    stale-answer-ttl __BIND_STALE_ANSWER_TTL__;
    stale-answer-client-timeout 0;

    managed-keys-directory "/var/named/dynamic";
    pid-file "/run/named/named.pid";
    session-keyfile "/run/named/session.key";
    statistics-file "/var/named/data/named_stats.txt";
    memstatistics-file "/var/named/data/named_mem_stats.txt";
    secroots-file "/var/named/data/named.secroots";
    recursing-file "/var/named/data/named.recursing";

    version none;
    hostname none;
    server-id none;
};

logging {
    channel default_file {
        file "/var/log/named/default.log" versions 3 size 10m;
        severity info;
        print-time yes;
        print-severity yes;
        print-category yes;
    };

    channel query_file {
        file "/var/log/named/query.log" versions 3 size 10m;
        severity info;
        print-time yes;
        print-severity yes;
        print-category yes;
    };

    category default { default_file; };
    category resolver { default_file; };
    category lame-servers { null; };
    category queries { query_file; };
};
