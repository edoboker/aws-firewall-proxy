load_module /usr/lib64/nginx/modules/ngx_stream_module.so;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    resolver 169.254.169.253 valid=1s ipv6=off;
    resolver_timeout 5s;

    # SNI allowlist is loaded from /etc/nginx/conf.d/sni_allowlist.conf, which
    # defines `map $ssl_preread_server_name $sni_allowed { ... }` populated by
    # refresh-sni-allowlist.sh from SSM Parameter Store.
    include /etc/nginx/conf.d/sni_allowlist.conf;

    # Empty $upstream causes proxy_pass to fail and the connection to close —
    # this is how denials happen at the nginx gate.
    map $sni_allowed $upstream {
        1       $ssl_preread_server_name:443;
        default "";
    }

    log_format proxy '$remote_addr [$time_local] $protocol $status '
                     '$bytes_sent $bytes_received $session_time '
                     'sni="$ssl_preread_server_name" allowed=$sni_allowed';
    access_log /var/log/nginx/access.log proxy;

    server {
        listen 8443;
        ssl_preread on;
        proxy_pass $upstream;
        proxy_connect_timeout 10s;
        proxy_timeout 600s;
    }
}
