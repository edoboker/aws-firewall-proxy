load_module modules/ngx_stream_original_dst_module.so;

env ENFORCE;
env DNS_RESOLVER;
env DNS_RESOLVERS;
env DNS_QUERIES_PER_SNI;
env SPIKE_DEBUG;

worker_processes  1;
error_log /dev/stderr __ERROR_LOG_LEVEL__;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

# Minimal http block - OpenResty insists on one existing, and we use it for a
# tiny readiness endpoint that the test harness can hit.
http {
    access_log off;
    server {
        listen 127.0.0.1:8080;
        location = /ready { return 200 "ok\n"; }
    }
}

stream {
    # This file is rendered at container boot by entrypoint.sh.
    # __DNS_RESOLVERS__ is replaced with the resolver list used by both
    # nginx's upstream resolver and the Lua DNS check path.
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    # DNS fanout can intentionally hit slow or varying resolvers. Keep those
    # low-level cosocket timeouts out of the error log and rely on the
    # structured Lua mismatch/internal-failure events instead.
    lua_socket_log_errors off;
    lua_add_variable $spike_decision;
    lua_add_variable $spike_sni;
    lua_add_variable $spike_resolved;
    lua_add_variable $spike_dst_ip;

    # The postponed preread hook never fired in this REDIRECT proxy path.
    # Running Lua earlier means we must recover SNI ourselves from ClientHello.
    preread_by_lua_no_postpone on;

    # Optional structured per-connection JSON log.
    # $spike_sni is the useful hostname field; the Lua path no longer relies on
    # nginx's builtin $ssl_preread_server_name variable.
    log_format spike '{"spike_sni":"$spike_sni",'
                     '"spike_dst_ip":"$spike_dst_ip",'
                     '"spike_resolved":"$spike_resolved",'
                     '"original_dst":"$original_dst",'
                     '"client":"$remote_addr",'
                     '"status":"$status",'
                     '"spike_decision":"$spike_decision"}';

    # Debug-only: replace this with `access_log /dev/stderr spike;` when you
    # want one JSON line per proxied connection.
    access_log off;

    server {
        listen 8443;

        # Connect to the SNI host on 443. The current Lua path recovers the
        # hostname directly from ClientHello, resolves it, and only then allows
        # the proxying decision to continue.
        resolver __DNS_RESOLVERS__ ipv6=off valid=10s;

        preread_by_lua_file /usr/local/openresty/nginx/lua/check_sni.lua;

        # Debug-only: uncomment for one extra per-session summary line.
        # log_by_lua_file /usr/local/openresty/nginx/lua/debug_log_by_lua.lua;

        proxy_pass $spike_sni:443;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
    }
}
