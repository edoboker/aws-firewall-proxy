load_module modules/ngx_stream_original_dst_module.so;

env ENFORCE;
env DNS_RESOLVER;

worker_processes  1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

# Minimal http block — OpenResty insists on one existing, and we use it for a
# tiny readiness endpoint that the test harness can hit.
http {
    access_log off;
    server {
        listen 127.0.0.1:8080;
        location = /ready { return 200 "ok\n"; }
    }
}

stream {
    # This file is rendered at container boot by entrypoint.sh.
    # __DNS_RESOLVER__ is replaced with the single shared resolver used by both
    # nginx's upstream resolver and the Lua DNS check path.
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_add_variable $spike_decision;
    lua_add_variable $spike_sni;
    lua_add_variable $spike_sni_source;
    lua_add_variable $spike_resolved;
    lua_add_variable $spike_dst_ip;
    lua_add_variable $spike_trace;
    # The postponed preread hook never fired in this REDIRECT proxy path.
    # Running Lua earlier means we must recover SNI ourselves from ClientHello.
    preread_by_lua_no_postpone on;

    # Surface the spike decisions on stderr in a structured-ish format.
    # Caveat: $ssl_preread_server_name is usually empty in this path because
    # preread Lua runs before nginx has populated the builtin variable, so
    # $spike_sni is the useful hostname field to inspect.
    log_format spike '{"sni":"$ssl_preread_server_name",'
                     '"spike_sni":"$spike_sni",'
                     '"spike_sni_source":"$spike_sni_source",'
                     '"spike_dst_ip":"$spike_dst_ip",'
                     '"spike_resolved":"$spike_resolved",'
                     '"original_dst":"$original_dst",'
                     '"client":"$remote_addr",'
                     '"status":"$status",'
                     '"spike_decision":"$spike_decision",'
                     '"spike_trace":"$spike_trace"}';

    access_log /dev/stderr spike;

    server {
        listen 8443;
        ssl_preread on;

        # Connect to the SNI host on 443. Lua fills $spike_sni from either the
        # built-in ssl_preread variable or a manual ClientHello parse, then
        # independently resolves it before allowing the handshake to continue.
        resolver __DNS_RESOLVER__ ipv6=off valid=10s;

        preread_by_lua_file /usr/local/openresty/nginx/lua/check_sni.lua;
        log_by_lua_file /usr/local/openresty/nginx/lua/log_session.lua;

        proxy_pass $spike_sni:443;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
    }
}
