user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    # AWS VPC DNS resolver
    resolver 169.254.169.253 valid=30s ipv6=off;
    resolver_timeout 5s;

    log_format proxy '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$ssl_preread_server_name"';

    access_log /var/log/nginx/access.log proxy;

    server {
        listen 8443;

        # Read the TLS ClientHello to extract the SNI hostname without terminating TLS.
        # $ssl_preread_server_name is populated from the SNI extension.
        ssl_preread on;

        # Forward to the DNS-resolved IP of the SNI hostname.
        # This is the core security enforcement: the original destination IP in the
        # client packet is completely ignored — nginx always connects to the address
        # returned by DNS for the requested hostname, preventing SNI/IP spoofing.
        proxy_pass $ssl_preread_server_name:443;

        proxy_connect_timeout 10s;
        proxy_timeout         600s;
    }
}
